<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="tg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/><stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <filter id="ds4"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/></filter>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#5eead4"/></marker>
  </defs>

  <rect width="820" height="300" rx="12" fill="#0f172a"/>
  <text x="410" y="30" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2.5">TEALGUARD — PARALLEL GUARDRAIL EXECUTION</text>

  <!-- Input -->
  <rect x="30" y="120" width="120" height="50" rx="8" fill="#1e3a5f" filter="url(#ds4)"/>
  <text x="90" y="142" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">User Input</text>
  <text x="90" y="158" text-anchor="middle" fill="#93c5fd" font-size="9">prompt / content</text>

  <!-- Fork -->
  <circle cx="200" cy="145" r="18" fill="url(#tg4)" filter="url(#ds4)"/>
  <text x="200" y="149" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">FORK</text>
  <line x1="150" y1="145" x2="180" y2="145" stroke="#5eead4" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- Parallel lanes -->
  <!-- PII -->
  <line x1="218" y1="133" x2="280" y2="80" stroke="#5eead4" stroke-width="1" marker-end="url(#a4)"/>
  <rect x="284" y="56" width="180" height="48" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1" filter="url(#ds4)"/>
  <text x="374" y="76" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="600">PII Detection</text>
  <text x="374" y="92" text-anchor="middle" fill="#94a3b8" font-size="9">emails, SSNs, cards  •  &lt; 2ms</text>

  <!-- Prompt Injection -->
  <line x1="218" y1="140" x2="280" y2="120" stroke="#5eead4" stroke-width="1" marker-end="url(#a4)"/>
  <rect x="284" y="110" width="180" height="48" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1" filter="url(#ds4)"/>
  <text x="374" y="130" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="600">Prompt Injection</text>
  <text x="374" y="146" text-anchor="middle" fill="#94a3b8" font-size="9">jailbreaks, hijacking  •  &lt; 3ms</text>

  <!-- Content Moderation -->
  <line x1="218" y1="152" x2="280" y2="172" stroke="#5eead4" stroke-width="1" marker-end="url(#a4)"/>
  <rect x="284" y="164" width="180" height="48" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1" filter="url(#ds4)"/>
  <text x="374" y="184" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="600">Content Moderation</text>
  <text x="374" y="200" text-anchor="middle" fill="#94a3b8" font-size="9">hate, violence, sexual  •  &lt; 2ms</text>

  <!-- Custom Patterns -->
  <line x1="218" y1="158" x2="280" y2="232" stroke="#5eead4" stroke-width="1" marker-end="url(#a4)"/>
  <rect x="284" y="218" width="180" height="48" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1" filter="url(#ds4)"/>
  <text x="374" y="238" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="600">Custom Patterns</text>
  <text x="374" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">regex, policy rules  •  &lt; 1ms</text>

  <!-- Merge -->
  <line x1="464" y1="80" x2="542" y2="140" stroke="#5eead4" stroke-width="1"/>
  <line x1="464" y1="134" x2="542" y2="140" stroke="#5eead4" stroke-width="1"/>
  <line x1="464" y1="188" x2="542" y2="148" stroke="#5eead4" stroke-width="1"/>
  <line x1="464" y1="242" x2="542" y2="152" stroke="#5eead4" stroke-width="1"/>
  <circle cx="560" cy="145" r="18" fill="url(#tg4)" filter="url(#ds4)"/>
  <text x="560" y="143" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">MERGE</text>
  <text x="560" y="152" text-anchor="middle" fill="#fff" font-size="6">&amp; AGG</text>

  <!-- Result -->
  <line x1="578" y1="145" x2="618" y2="145" stroke="#5eead4" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="622" y="100" width="170" height="90" rx="10" fill="url(#tg4)" filter="url(#ds4)"/>
  <text x="707" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">GuardrailResult</text>
  <line x1="642" y1="132" x2="772" y2="132" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="707" y="150" text-anchor="middle" fill="#ccfbf1" font-size="10">passed: boolean</text>
  <text x="707" y="166" text-anchor="middle" fill="#ccfbf1" font-size="10">risk_score: 0–100</text>
  <text x="707" y="182" text-anchor="middle" fill="#ccfbf1" font-size="10">violations: string[]</text>

  <!-- Total time badge -->
  <rect x="330" y="274" width="160" height="20" rx="10" fill="#0d9488" opacity="0.3"/>
  <text x="410" y="288" text-anchor="middle" fill="#5eead4" font-size="9" font-weight="600">Total: &lt; 5ms (parallel)</text>
</svg>