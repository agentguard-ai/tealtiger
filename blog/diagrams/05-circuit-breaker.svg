<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="ds5"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/></filter>
    <marker id="a5w" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#fff"/></marker>
    <marker id="a5r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#f87171"/></marker>
    <marker id="a5g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#34d399"/></marker>
    <marker id="a5y" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#fbbf24"/></marker>
  </defs>

  <rect width="720" height="340" rx="12" fill="#0f172a"/>
  <text x="360" y="30" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2.5">TEALCIRCUIT — STATE MACHINE</text>

  <!-- CLOSED state -->
  <circle cx="160" cy="160" r="60" fill="#065f46" stroke="#10b981" stroke-width="2.5" filter="url(#ds5)"/>
  <text x="160" y="152" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">CLOSED</text>
  <text x="160" y="170" text-anchor="middle" fill="#a7f3d0" font-size="9">Normal operation</text>
  <text x="160" y="184" text-anchor="middle" fill="#6ee7b7" font-size="8">Requests pass through</text>

  <!-- Initial arrow -->
  <circle cx="60" cy="100" r="6" fill="#5eead4"/>
  <line x1="66" y1="104" x2="108" y2="130" stroke="#5eead4" stroke-width="1.5" marker-end="url(#a5g)"/>

  <!-- OPEN state -->
  <circle cx="560" cy="160" r="60" fill="#991b1b" stroke="#ef4444" stroke-width="2.5" filter="url(#ds5)"/>
  <text x="560" y="152" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">OPEN</text>
  <text x="560" y="170" text-anchor="middle" fill="#fca5a5" font-size="9">Fail fast</text>
  <text x="560" y="184" text-anchor="middle" fill="#fca5a5" font-size="8">No provider calls</text>

  <!-- HALF-OPEN state -->
  <circle cx="360" cy="280" r="52" fill="#92400e" stroke="#f59e0b" stroke-width="2.5" filter="url(#ds5)"/>
  <text x="360" y="272" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">HALF-OPEN</text>
  <text x="360" y="290" text-anchor="middle" fill="#fde68a" font-size="9">Test traffic</text>
  <text x="360" y="304" text-anchor="middle" fill="#fcd34d" font-size="8">Evaluating recovery</text>

  <!-- CLOSED -> OPEN (N failures) -->
  <path d="M 220 145 Q 360 80 500 145" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#a5r)"/>
  <rect x="310" y="82" width="100" height="20" rx="4" fill="#0f172a"/>
  <text x="360" y="96" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">N failures</text>

  <!-- OPEN -> HALF-OPEN (timeout) -->
  <path d="M 520 205 Q 480 260 415 280" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#a5y)"/>
  <rect x="450" y="238" width="100" height="20" rx="4" fill="#0f172a"/>
  <text x="500" y="252" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Reset timeout</text>

  <!-- HALF-OPEN -> CLOSED (success) -->
  <path d="M 310 265 Q 230 230 195 215" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#a5g)"/>
  <rect x="210" y="228" width="90" height="20" rx="4" fill="#0f172a"/>
  <text x="255" y="242" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Success ✓</text>

  <!-- HALF-OPEN -> OPEN (failure) -->
  <path d="M 405 260 Q 480 220 530 205" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#a5r)"/>
  <rect x="440" y="210" width="70" height="20" rx="4" fill="#0f172a"/>
  <text x="475" y="224" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Failure ✗</text>

  <!-- Self-loop on CLOSED (success resets) -->
  <path d="M 115 125 Q 80 80 115 105" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="72" y="96" text-anchor="middle" fill="#34d399" font-size="7">success resets count</text>
</svg>