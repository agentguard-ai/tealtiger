<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="ds6"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <rect width="820" height="220" rx="12" fill="#0f172a"/>
  <text x="410" y="28" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2.5">TEALAUDIT — REDACTION LEVELS</text>

  <!-- Security spectrum bar -->
  <rect x="40" y="44" width="740" height="8" rx="4" fill="#1e293b"/>
  <rect x="40" y="44" width="740" height="8" rx="4" fill="url(#specGrad)"/>
  <defs>
    <linearGradient id="specGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/><stop offset="50%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  <text x="40" y="68" fill="#6ee7b7" font-size="8" font-weight="600">MORE RESTRICTIVE</text>
  <text x="780" y="68" text-anchor="end" fill="#fca5a5" font-size="8" font-weight="600">LESS RESTRICTIVE</text>

  <!-- FULL -->
  <rect x="40" y="80" width="140" height="120" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1.5" filter="url(#ds6)"/>
  <text x="110" y="102" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">FULL</text>
  <line x1="56" y1="110" x2="164" y2="110" stroke="#10b981" stroke-width="0.5"/>
  <text x="110" y="128" text-anchor="middle" fill="#a7f3d0" font-size="9">Content redacted</text>
  <text x="110" y="144" text-anchor="middle" fill="#a7f3d0" font-size="9">No metadata</text>
  <text x="110" y="164" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="600">Maximum safety</text>
  <text x="110" y="188" text-anchor="middle" fill="#34d399" font-size="8">Incident response</text>

  <!-- CATEGORY_ONLY -->
  <rect x="192" y="80" width="140" height="120" rx="8" fill="#115e59" stroke="#0d9488" stroke-width="1.5" filter="url(#ds6)"/>
  <text x="262" y="102" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">CATEGORY_ONLY</text>
  <line x1="208" y1="110" x2="316" y2="110" stroke="#0d9488" stroke-width="0.5"/>
  <text x="262" y="128" text-anchor="middle" fill="#99f6e4" font-size="9">Content category</text>
  <text x="262" y="144" text-anchor="middle" fill="#99f6e4" font-size="9">No raw data</text>
  <text x="262" y="164" text-anchor="middle" fill="#5eead4" font-size="8" font-weight="600">Compliance safe</text>
  <text x="262" y="188" text-anchor="middle" fill="#5eead4" font-size="8">Regulated industries</text>

  <!-- SIZE_ONLY -->
  <rect x="344" y="80" width="140" height="120" rx="8" fill="#134e4a" stroke="#14b8a6" stroke-width="1.5" filter="url(#ds6)"/>
  <text x="414" y="102" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">SIZE_ONLY</text>
  <line x1="360" y1="110" x2="468" y2="110" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="414" y="128" text-anchor="middle" fill="#99f6e4" font-size="9">Content size</text>
  <text x="414" y="144" text-anchor="middle" fill="#99f6e4" font-size="9">No raw data</text>
  <text x="414" y="164" text-anchor="middle" fill="#5eead4" font-size="8" font-weight="600">Analytics safe</text>
  <text x="414" y="188" text-anchor="middle" fill="#5eead4" font-size="8">Usage metrics</text>

  <!-- HASH (default) -->
  <rect x="496" y="76" width="140" height="128" rx="8" fill="#0d9488" stroke="#5eead4" stroke-width="2.5" filter="url(#ds6)"/>
  <rect x="536" y="78" width="60" height="16" rx="8" fill="#5eead4"/>
  <text x="566" y="90" text-anchor="middle" fill="#0f172a" font-size="8" font-weight="700">DEFAULT</text>
  <text x="566" y="110" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">HASH</text>
  <line x1="512" y1="118" x2="620" y2="118" stroke="#99f6e4" stroke-width="0.5"/>
  <text x="566" y="136" text-anchor="middle" fill="#ccfbf1" font-size="9">SHA-256 hash</text>
  <text x="566" y="152" text-anchor="middle" fill="#ccfbf1" font-size="9">Content size</text>
  <text x="566" y="172" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Production safe ★</text>
  <text x="566" y="192" text-anchor="middle" fill="#ccfbf1" font-size="8">Recommended</text>

  <!-- NONE -->
  <rect x="648" y="80" width="140" height="120" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" filter="url(#ds6)"/>
  <text x="718" y="102" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">NONE</text>
  <line x1="664" y1="110" x2="772" y2="110" stroke="#ef4444" stroke-width="0.5"/>
  <text x="718" y="128" text-anchor="middle" fill="#fca5a5" font-size="9">Raw content</text>
  <text x="718" y="144" text-anchor="middle" fill="#fca5a5" font-size="9">Debug only</text>
  <text x="718" y="164" text-anchor="middle" fill="#f87171" font-size="8" font-weight="600">⚠ Explicit opt-in</text>
  <text x="718" y="188" text-anchor="middle" fill="#f87171" font-size="8">Never in production</text>
</svg>