  <rect x="408" y="268" width="148" height="110" rx="8" fill="url(#tealGrad)" filter="url(#ds)"/>
  <text x="482" y="290" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">TealMonitor</text>
