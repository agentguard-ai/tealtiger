<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488" /><stop offset="100%" style="stop-color:#0f766e" />
    </linearGradient>
    <linearGradient id="darkTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a" /><stop offset="100%" style="stop-color:#115e59" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f" /><stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1f5e" /><stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
    <marker id="arrTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#5eead4"/></marker>
  </defs>

  <rect width="920" height="660" rx="12" fill="#0f172a"/>
  <text x="460" y="32" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2.5">TEALTIGER v1.1.1 — PLATFORM ARCHITECTURE</text>

  <!-- Developer Application box -->
  <rect x="280" y="48" width="360" height="42" rx="8" fill="url(#blueGrad)" filter="url(#ds)"/>
  <text x="460" y="74" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Developer Application (AI Agent)</text>

  <!-- Arrow -->
  <line x1="460" y1="90" x2="460" y2="112" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SDK outer container -->
  <rect x="30" y="116" width="860" height="410" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" filter="url(#ds)"/>
  <text x="460" y="140" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700" letter-spacing="1.5">TEALTIGER SDK v1.1.1</text>

  <!-- Provider row -->
  <rect x="55" y="152" width="810" height="56" rx="8" fill="url(#darkTeal)" opacity="0.85"/>
  <text x="460" y="170" text-anchor="middle" fill="#99f6e4" font-size="10" font-weight="600" letter-spacing="1">MULTI-PROVIDER LAYER</text>

  <!-- Provider chips -->
  <rect x="72" y="178" width="90" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="117" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealOpenAI</text>
  <rect x="172" y="178" width="100" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="222" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealAnthropic</text>
  <rect x="282" y="178" width="90" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="327" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealGemini</text>
  <rect x="382" y="178" width="96" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="430" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealBedrock</text>
  <rect x="488" y="178" width="106" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="541" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealAzureOpenAI</text>
  <rect x="604" y="178" width="90" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="649" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealMistral</text>
  <rect x="704" y="178" width="90" height="22" rx="4" fill="#0d9488" opacity="0.7"/><text x="749" y="193" text-anchor="middle" fill="#fff" font-size="9" font-weight="500">TealCohere</text>

