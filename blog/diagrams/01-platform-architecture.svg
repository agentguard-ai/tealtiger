  <text x="646" y="346" text-anchor="middle" fill="#ccfbf1" font-size="9">State Machine</text>
  <text x="646" y="362" text-anchor="middle" fill="#ccfbf1" font-size="9">Degradation</text>

  <!-- TealAudit -->
