  <text x="482" y="314" text-anchor="middle" fill="#ccfbf1" font-size="9">Behavioral Baselines</text>
  <text x="482" y="330" text-anchor="middle" fill="#ccfbf1" font-size="9">Anomaly Detection</text>
  <text x="482" y="346" text-anchor="middle" fill="#ccfbf1" font-size="9">Cost Tracking</text>
  <text x="482" y="362" text-anchor="middle" fill="#ccfbf1" font-size="9">Spend Velocity</text>

