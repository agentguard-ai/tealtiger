  <text x="620" y="442" text-anchor="middle" fill="#ccfbf1" font-size="9">Cost Metadata</text>
  <text x="180" y="462" text-anchor="middle" fill="#ccfbf1" font-size="9">Immutable Schema</text>
  <text x="320" y="462" text-anchor="middle" fill="#ccfbf1" font-size="9">OpenTelemetry Traces</text>
  <text x="480" y="462" text-anchor="middle" fill="#ccfbf1" font-size="9">Multi-Tenant</text>
  <text x="620" y="462" text-anchor="middle" fill="#ccfbf1" font-size="9">JUnit Export</text>

