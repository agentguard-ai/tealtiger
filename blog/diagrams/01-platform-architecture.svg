  <text x="794" y="414" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="700">Policy Test</text>
  <text x="794" y="428" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="700">Harness</text>
  <line x1="752" y1="436" x2="836" y2="436" stroke="#0d9488" stroke-width="0.5"/>
  <text x="794" y="452" text-anchor="middle" fill="#94a3b8" font-size="8">Test Suites</text>
  <text x="794" y="466" text-anchor="middle" fill="#94a3b8" font-size="8">CI/CD Export</text>
  <text x="794" y="480" text-anchor="middle" fill="#94a3b8" font-size="8">Test Corpora</text>

  <!-- Arrow from SDK to LLMs -->
  <line x1="460" y1="526" x2="460" y2="556" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LLM Provider APIs -->
  <rect x="80" y="560" width="760" height="80" rx="10" fill="url(#purpleGrad)" filter="url(#ds)"/>
  <text x="460" y="584" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600" letter-spacing="1">LLM PROVIDER APIs</text>

  <!-- Provider names -->
  <text x="140" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">OpenAI</text>
  <text x="240" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">Anthropic</text>
  <text x="340" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">Google AI</text>
  <text x="440" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">AWS Bedrock</text>
  <text x="550" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">Azure OpenAI</text>
  <text x="660" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">Mistral AI</text>
  <text x="760" y="608" text-anchor="middle" fill="#c4b5fd" font-size="9">Cohere</text>

  <!-- 95%+ badge -->
  <rect x="370" y="624" width="180" height="22" rx="11" fill="#0d9488" opacity="0.3"/>
  <text x="460" y="639" text-anchor="middle" fill="#5eead4" font-size="9" font-weight="600">95%+ Market Coverage</text>
