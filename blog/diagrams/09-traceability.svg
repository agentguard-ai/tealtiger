<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="tg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/><stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <filter id="ds9"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/></filter>
    <marker id="a9" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#5eead4"/></marker>
  </defs>

  <rect width="820" height="320" rx="12" fill="#0f172a"/>
  <text x="410" y="28" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2.5">END-TO-END TRACEABILITY</text>

  <!-- ExecutionContext box -->
  <rect x="40" y="46" width="260" height="250" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" filter="url(#ds9)"/>
  <text x="170" y="70" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700">ExecutionContext</text>
  <line x1="56" y1="80" x2="284" y2="80" stroke="#334155" stroke-width="1"/>

  <!-- Context fields -->
  <rect x="56" y="90" width="228" height="28" rx="5" fill="#0d9488" opacity="0.2"/>
  <text x="72" y="109" fill="#5eead4" font-size="10" font-weight="600">correlation_id</text>
  <text x="276" y="109" text-anchor="end" fill="#94a3b8" font-size="9">UUID v4 (crypto-random)</text>

  <rect x="56" y="124" width="228" height="28" rx="5" fill="#0f172a"/>
  <text x="72" y="143" fill="#5eead4" font-size="10" font-weight="600">trace_id</text>
  <text x="276" y="143" text-anchor="end" fill="#94a3b8" font-size="9">OpenTelemetry compatible</text>

  <rect x="56" y="158" width="228" height="28" rx="5" fill="#0d9488" opacity="0.2"/>
  <text x="72" y="177" fill="#5eead4" font-size="10" font-weight="600">span_id</text>
  <text x="276" y="177" text-anchor="end" fill="#94a3b8" font-size="9">Per operation (auto)</text>

  <rect x="56" y="192" width="228" height="28" rx="5" fill="#0f172a"/>
  <text x="72" y="211" fill="#5eead4" font-size="10" font-weight="600">tenant_id</text>
  <text x="276" y="211" text-anchor="end" fill="#94a3b8" font-size="9">Multi-tenant isolation</text>

  <rect x="56" y="226" width="228" height="28" rx="5" fill="#0d9488" opacity="0.2"/>
  <text x="72" y="245" fill="#5eead4" font-size="10" font-weight="600">workflow_id / run_id</text>
  <text x="276" y="245" text-anchor="end" fill="#94a3b8" font-size="9">Governance aggregation</text>

  <rect x="56" y="260" width="228" height="28" rx="5" fill="#0f172a"/>
  <text x="72" y="279" fill="#5eead4" font-size="10" font-weight="600">env / app</text>
  <text x="276" y="279" text-anchor="end" fill="#94a3b8" font-size="9">Environment metadata</text>

  <!-- Arrows to propagation -->
  <line x1="300" y1="110" x2="360" y2="90" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>
  <line x1="300" y1="140" x2="360" y2="140" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>
  <line x1="300" y1="170" x2="360" y2="190" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>
  <line x1="300" y1="200" x2="360" y2="240" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>

  <!-- Propagation column -->
  <rect x="364" y="56" width="200" height="240" rx="10" fill="url(#tg9)" filter="url(#ds9)"/>
  <text x="464" y="78" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Auto-Propagation</text>
  <line x1="380" y1="86" x2="548" y2="86" stroke="#99f6e4" stroke-width="0.5"/>

  <text x="464" y="108" text-anchor="middle" fill="#ccfbf1" font-size="10" font-weight="600">TealEngine</text>
  <text x="464" y="122" text-anchor="middle" fill="#99f6e4" font-size="8">Decision.correlation_id</text>

  <text x="464" y="148" text-anchor="middle" fill="#ccfbf1" font-size="10" font-weight="600">TealGuard</text>
  <text x="464" y="162" text-anchor="middle" fill="#99f6e4" font-size="8">Result.correlation_id</text>

  <text x="464" y="192" text-anchor="middle" fill="#ccfbf1" font-size="10" font-weight="600">TealMonitor</text>
  <text x="464" y="206" text-anchor="middle" fill="#99f6e4" font-size="8">Metrics.correlation_id</text>

  <text x="464" y="236" text-anchor="middle" fill="#ccfbf1" font-size="10" font-weight="600">TealAudit</text>
  <text x="464" y="250" text-anchor="middle" fill="#99f6e4" font-size="8">Event.correlation_id</text>

  <text x="464" y="280" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">&lt; 0.5ms propagation</text>

  <!-- Arrows to external -->
  <line x1="564" y1="110" x2="620" y2="90" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>
  <line x1="564" y1="160" x2="620" y2="160" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>
  <line x1="564" y1="210" x2="620" y2="230" stroke="#5eead4" stroke-width="1" marker-end="url(#a9)"/>

  <!-- External integrations -->
  <rect x="624" y="66" width="170" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#ds9)"/>
  <text x="709" y="88" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">OpenTelemetry</text>
  <text x="709" y="104" text-anchor="middle" fill="#94a3b8" font-size="8">Distributed tracing</text>

  <rect x="624" y="136" width="170" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#ds9)"/>
  <text x="709" y="158" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">HTTP Headers</text>
  <text x="709" y="174" text-anchor="middle" fill="#94a3b8" font-size="8">Cross-service propagation</text>

  <rect x="624" y="206" width="170" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#ds9)"/>
  <text x="709" y="228" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Log Aggregators</text>
  <text x="709" y="244" text-anchor="middle" fill="#94a3b8" font-size="8">Query by correlation_id</text>
</svg>