version: v1.1.0
kind: tealtiger.stability_guarantees
id: tealtiger.stability_guarantees.v1_1_0
source_doc: /versioning/stability-guarantees
format: v1

stability_levels:
  - immutable
  - stable_within_v1_1_x
  - expandable
  - experimental
  - deprecated

guarantees:
  determinism:
    stability: stable_within_v1_1_x
    rule: same_inputs_same_policy_version_same_outcome

  stable_ids:
    stability: stable_within_v1_1_x
    rule: ids_are_immutable_and_not_reusable

  decision_lifecycle:
    stability: immutable
    stage_ids:
      - ingress
      - signals
      - risk
      - policy_eval
      - decision
      - reason_codes
      - actions
      - audit
      - telemetry

  golden_corpus:
    stability: expandable
    id: tealtiger.golden_corpus.v1_1_0
    test_case_ids_are_immutable: true

  audit_event_schema:
    stability: stable_within_v1_1_x
    schema:
      name: tealtiger.audit_event
      version: "1.1.0"
    extensibility:
      allowed_namespace: extensions
      rule: additions_only

allowed_changes_v1_1_x:
  - add_optional_audit_fields_under_extensions
  - add_reason_codes
  - add_reason_code_families
  - add_golden_corpus_test_cases

forbidden_changes_v1_1_x:
  - change_decision_outcome_for_same_inputs
  - reuse_stable_id_for_new_semantics
  - rename_decision_lifecycle_stage_ids
  - change_existing_reason_code_meaning
  - change_audit_schema_identity
