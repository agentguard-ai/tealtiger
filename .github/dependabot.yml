version: 2
updates:
  # GitHub Actions — keep workflow action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci-cd"

  # Hub repo npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # TypeScript SDK (populated when packages/tealtiger-sdk is ready)
  - package-ecosystem: "npm"
    directory: "/packages/tealtiger-sdk"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "sdk"

  # Python SDK (populated when packages/tealtiger-python is ready)
  - package-ecosystem: "pip"
    directory: "/packages/tealtiger-python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
