name: Build and Push Docker Image Variants

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.1.1)'
        required: true
        default: '1.2.0'

permissions:
  contents: read
  packages: write

jobs:
  python-images:
    name: "Python SDK - ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: latest
            dockerfile: docker/python/Dockerfile
            tags: "tealtigeradmin/tealtiger-python:latest,tealtigeradmin/tealtiger-python:${{ github.event.inputs.version }},ghcr.io/agentguard-ai/tealtiger-python:latest,ghcr.io/agentguard-ai/tealtiger-python:${{ github.event.inputs.version }}"
          - variant: dev
            dockerfile: docker/python/Dockerfile.dev
            tags: "tealtigeradmin/tealtiger-python:dev,ghcr.io/agentguard-ai/tealtiger-python:dev"
          - variant: alpine
            dockerfile: docker/python/Dockerfile.alpine
            tags: "tealtigeradmin/tealtiger-python:alpine,ghcr.io/agentguard-ai/tealtiger-python:alpine"
          - variant: jupyter
            dockerfile: docker/python/Dockerfile.jupyter
            tags: "tealtigeradmin/tealtiger-python:jupyter,ghcr.io/agentguard-ai/tealtiger-python:jupyter"
          - variant: sidecar
            dockerfile: packages/tealtiger-python/Dockerfile.sidecar
            tags: "tealtigeradmin/tealtiger-python:${{ github.event.inputs.version }}-sidecar,tealtigeradmin/tealtiger-python:sidecar,ghcr.io/agentguard-ai/tealtiger-python:${{ github.event.inputs.version }}-sidecar,ghcr.io/agentguard-ai/tealtiger-python:sidecar"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.tags }}
          platforms: linux/amd64

  typescript-images:
    name: "TypeScript SDK - ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: latest
            dockerfile: docker/typescript/Dockerfile
            tags: "tealtigeradmin/tealtiger-typescript:latest,tealtigeradmin/tealtiger-typescript:${{ github.event.inputs.version }},ghcr.io/agentguard-ai/tealtiger-typescript:latest,ghcr.io/agentguard-ai/tealtiger-typescript:${{ github.event.inputs.version }}"
          - variant: dev
            dockerfile: docker/typescript/Dockerfile.dev
            tags: "tealtigeradmin/tealtiger-typescript:dev,ghcr.io/agentguard-ai/tealtiger-typescript:dev"
          - variant: governance-sidecar
            dockerfile: packages/tealtiger-sdk/Dockerfile.sidecar
            tags: "tealtigeradmin/tealtiger-typescript:${{ github.event.inputs.version }}-governance,tealtigeradmin/tealtiger-typescript:governance,ghcr.io/agentguard-ai/tealtiger-typescript:${{ github.event.inputs.version }}-governance,ghcr.io/agentguard-ai/tealtiger-typescript:governance"
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.tags }}
          platforms: linux/amd64
