name: Adapter coverage

on:
  pull_request:
    paths:
      - "packages/haystack-tealtiger/**"
      - "packages/camelai-tealtiger/**"
      - "packages/pydanticai-tealtiger/**"
      - "packages/tealtiger-ai-sdk/**"
      - ".github/workflows/adapter-coverage.yml"
  push:
    branches: [main]
    paths:
      - "packages/haystack-tealtiger/**"
      - "packages/camelai-tealtiger/**"
      - "packages/pydanticai-tealtiger/**"
      - "packages/tealtiger-ai-sdk/**"
      - ".github/workflows/adapter-coverage.yml"

jobs:
  python-adapters:
    name: Python adapter coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - haystack-tealtiger
          - camelai-tealtiger
          - pydanticai-tealtiger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with test dependencies
        working-directory: packages/${{ matrix.package }}
        run: python -m pip install -e ".[dev]"
      - name: Run coverage
        working-directory: packages/${{ matrix.package }}
        run: pytest --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: packages/${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  typescript-adapter:
    name: TypeScript adapter coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tealtiger-ai-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/tealtiger-ai-sdk/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: packages/tealtiger-ai-sdk/coverage
          flags: tealtiger-ai-sdk
          fail_ci_if_error: false
