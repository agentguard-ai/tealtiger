name: Adapter coverage

on:
  pull_request:
    paths:
      - "packages/haystack-tealtiger/**"
      - "packages/camelai-tealtiger/**"
      - "packages/pydanticai-tealtiger/**"
      - "packages/tealtiger-ai-sdk/**"
      - ".github/workflows/adapter-coverage.yml"
  push:
    branches: [main]
    paths:
      - "packages/haystack-tealtiger/**"
      - "packages/camelai-tealtiger/**"
      - "packages/pydanticai-tealtiger/**"
      - "packages/tealtiger-ai-sdk/**"
      - ".github/workflows/adapter-coverage.yml"

permissions:
  contents: read

jobs:
  python-adapters:
    name: Python adapter coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - haystack-tealtiger
          - camelai-tealtiger
          - pydanticai-tealtiger
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install hash-pinned test tools
        working-directory: packages/${{ matrix.package }}
        run: python -m pip install --require-hashes -r ../../.github/adapter-coverage-requirements.txt
      - name: Run coverage
        working-directory: packages/${{ matrix.package }}
        env:
          PYTHONPATH: src
        run: pytest --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          files: packages/${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  typescript-adapter:
    name: TypeScript adapter coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tealtiger-ai-sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/tealtiger-ai-sdk/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          directory: packages/tealtiger-ai-sdk/coverage
          flags: tealtiger-ai-sdk
          fail_ci_if_error: false
