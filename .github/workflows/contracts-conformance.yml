name: Contracts Conformance

on:
  push:
    branches: [main]
    paths:
      - 'packages/tealtiger-contracts/**'
      - '.github/workflows/contracts-conformance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/tealtiger-contracts/**'
      - '.github/workflows/contracts-conformance.yml'

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-language-contracts:
    name: TypeScript and Python vectors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/tealtiger-contracts/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/tealtiger-contracts/python/pyproject.toml

      - name: Install TypeScript dependencies
        working-directory: packages/tealtiger-contracts
        run: npm ci

      - name: Install Python package and generator
        run: python -m pip install -e "packages/tealtiger-contracts/python[dev]"

      - name: Verify generated TypeScript and run vectors
        working-directory: packages/tealtiger-contracts
        run: npm run verify

      - name: Verify generated Python
        working-directory: packages/tealtiger-contracts
        run: python scripts/generate_python.py --check

      - name: Lint and type-check Python
        working-directory: packages/tealtiger-contracts
        run: |
          python -m ruff check scripts/generate_python.py python/src python/tests
          python -m mypy scripts/generate_python.py python/src

      - name: Run Python vectors
        working-directory: packages/tealtiger-contracts
        run: python -m pytest python/tests
