name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan — Sunday 02:00 UTC
    - cron: '0 2 * * 0'

# Minimal top-level permissions; jobs only request what they need.
permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # npm audit — block PRs with high/critical dependency vulnerabilities
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit (hub)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Secret scanning — block commits that contain leaked credentials
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@e74404a774dac2767b173c420393a27dff012fab # main @ 2026-06-03
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # ---------------------------------------------------------------------------
  # License check — ensure no GPL/AGPL deps sneak into this Apache 2.0 project
  # ---------------------------------------------------------------------------
  license-check:
    name: License compatibility check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for incompatible licenses
        # Fail if any dep uses GPL, AGPL, or LGPL (incompatible with Apache 2.0)
        run: npx license-checker@25.0.0 --production --failOn "GPL;AGPL;LGPL" --summary
