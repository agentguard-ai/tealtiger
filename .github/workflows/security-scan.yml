name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan — Sunday 02:00 UTC
    - cron: '0 2 * * 0'

# Minimal top-level permissions; jobs only request what they need.
permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # npm audit — block PRs with high/critical dependency vulnerabilities
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit (hub)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Secret scanning — block commits that contain leaked credentials
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@5a0f877b8afbe5ed69b5f13536eed05d259872ff # main @ 2026-06-03
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # ---------------------------------------------------------------------------
  # License check — ensure no GPL/AGPL deps sneak into this Apache 2.0 project
  # ---------------------------------------------------------------------------
  license-check:
    name: License compatibility check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check for incompatible licenses
        # Fail if any dep uses GPL, AGPL, or LGPL (incompatible with Apache 2.0)
        run: npx license-checker@25.0.0 --production --failOn "GPL;AGPL;LGPL" --summary
