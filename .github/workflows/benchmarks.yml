# TealTiger Red Team Benchmark CI Workflow
#
# Triggers on release tag creation. Starts the TealTiger Docker sidecar,
# runs all benchmark suites, compares against baseline thresholds,
# and commits updated BENCHMARKS.md on success.
#
# No paid API keys or external LLM calls required — TealTiger governance
# is fully deterministic.

name: Red Team Benchmarks

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Benchmark suite to run (all, garak, pint, agent, guardbench)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  benchmark:
    name: Run Red Team Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      tealtiger-sidecar:
        image: ghcr.io/agentguard-ai/tealtiger-sidecar:latest
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/tealtiger-sdk/package-lock.json

      - name: Install dependencies
        working-directory: packages/tealtiger-sdk
        run: npm ci

      - name: Wait for sidecar health
        run: |
          echo "Waiting for TealTiger sidecar to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Sidecar is healthy!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          # Final check
          curl -sf http://localhost:8080/health || (echo "Sidecar failed to start" && exit 1)

      - name: Run benchmark suites
        working-directory: packages/tealtiger-sdk
        run: |
          SUITE="${{ github.event.inputs.suite || 'all' }}"
          npx ts-node benchmarks/cli.ts \
            --suite "$SUITE" \
            --endpoint http://localhost:8080 \
            --output ./benchmark-results

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: packages/tealtiger-sdk/benchmark-results/
          retention-days: 90

      - name: Compare against baselines
        working-directory: packages/tealtiger-sdk
        run: |
          echo "Checking baseline thresholds..."
          if [ -f benchmark-results/results.json ]; then
            PASSED=$(jq -r '.baseline.passed' benchmark-results/results.json)
            if [ "$PASSED" = "false" ]; then
              echo "❌ Baseline regression detected!"
              jq '.baseline.regressions[]' benchmark-results/results.json
              exit 1
            fi
            echo "✅ All baselines passed"
          else
            echo "❌ No results file found"
            exit 1
          fi

      - name: Update BENCHMARKS.md
        if: success()
        run: |
          if [ -f packages/tealtiger-sdk/benchmark-results/BENCHMARKS.md ]; then
            cp packages/tealtiger-sdk/benchmark-results/BENCHMARKS.md BENCHMARKS.md
          fi

      - name: Commit updated BENCHMARKS.md
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BENCHMARKS.md
          if git diff --cached --quiet; then
            echo "No changes to BENCHMARKS.md"
          else
            git commit -m "docs: update BENCHMARKS.md with v${GITHUB_REF_NAME} results"
            git push origin HEAD:main
          fi
