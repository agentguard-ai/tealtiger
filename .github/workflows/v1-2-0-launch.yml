# TealTiger v1.2.0 Launch Workflow
# Orchestrates publication across distribution channels in 5 sequential stages.
# Stages: Pre-Flight → Package Managers → Container Registries → IaC → Post-Launch
#
# NOTE: This runs on the hub repo (tealtiger) which uses submodules.
# SDK code lives in packages/tealtiger-sdk and packages/tealtiger-python.

name: TealTiger v1.2.0 Launch

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.0)'
        required: true
        type: string
        default: '1.2.0'

concurrency:
  group: tealtiger-launch-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ── Pre-Flight Checks ─────────────────────────────────────────────
  pre-flight:
    name: Pre-Flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION. Expected semver (e.g., 1.2.0)"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      - name: Verify SDK versions match
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Check TypeScript SDK version
          TS_VERSION=$(node -p "require('./packages/tealtiger-sdk/package.json').version")
          if [ "$TS_VERSION" != "$VERSION" ]; then
            echo "::error::TypeScript SDK version ($TS_VERSION) does not match target ($VERSION)"
            exit 1
          fi
          echo "✅ TypeScript SDK version: $TS_VERSION"

          # Check Python SDK version
          PY_VERSION=$(grep '^version' packages/tealtiger-python/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PY_VERSION" != "$VERSION" ]; then
            echo "::error::Python SDK version ($PY_VERSION) does not match target ($VERSION)"
            exit 1
          fi
          echo "✅ Python SDK version: $PY_VERSION"

      - name: Check required credentials
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          MISSING=""
          [ -z "$NPM_TOKEN" ] && MISSING="$MISSING NPM_TOKEN"
          [ -z "$PYPI_TOKEN" ] && MISSING="$MISSING PYPI_TOKEN"
          [ -z "$DOCKERHUB_USERNAME" ] && MISSING="$MISSING DOCKERHUB_USERNAME"
          [ -z "$DOCKERHUB_TOKEN" ] && MISSING="$MISSING DOCKERHUB_TOKEN"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required credentials:$MISSING"
            exit 1
          fi
          echo "✅ All required credentials present"

  # ── Stage 1a: Publish to npm ───────────────────────────────────────
  stage-1a-npm:
    name: "Stage 1a - Publish to npm"
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install TS SDK dependencies
        working-directory: packages/tealtiger-sdk
        run: npm install

      - name: Build TS SDK
        working-directory: packages/tealtiger-sdk
        run: npm run build

      - name: Publish to npm
        working-directory: packages/tealtiger-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public 2>&1 || {
            EXIT_CODE=$?
            # E403 = already published (idempotent success)
            if npm view tealtiger@${{ github.event.inputs.version }} version 2>/dev/null; then
              echo "✅ tealtiger@${{ github.event.inputs.version }} already published to npm — skipping"
              exit 0
            fi
            exit $EXIT_CODE
          }

  # ── Stage 1b: Publish to PyPI ──────────────────────────────────────
  stage-1b-pypi:
    name: "Stage 1b - Publish to PyPI"
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build Python SDK
        working-directory: packages/tealtiger-python
        run: python -m build

      - name: Publish to PyPI
        working-directory: packages/tealtiger-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload dist/* 2>&1 || {
            EXIT_CODE=$?
            # Check if already published
            if pip index versions tealtiger 2>/dev/null | grep -q "${{ github.event.inputs.version }}"; then
              echo "✅ tealtiger==${{ github.event.inputs.version }} already published to PyPI — skipping"
              exit 0
            fi
            exit $EXIT_CODE
          }

  # ── Stage 2: Governance Sidecar Docker Images ──────────────────────
  stage-2-sidecar:
    name: "Stage 2 - Docker Sidecar (${{ matrix.variant }})"
    needs: [stage-1a-npm, stage-1b-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - variant: typescript-governance
            dockerfile: packages/tealtiger-sdk/Dockerfile.sidecar
            context: packages/tealtiger-sdk
            tags: |
              tealtigeradmin/tealtiger-typescript:${{ github.event.inputs.version }}-governance
              tealtigeradmin/tealtiger-typescript:governance
              ghcr.io/agentguard-ai/tealtiger-typescript:${{ github.event.inputs.version }}-governance
              ghcr.io/agentguard-ai/tealtiger-typescript:governance
          - variant: python-sidecar
            dockerfile: packages/tealtiger-python/Dockerfile.sidecar
            context: packages/tealtiger-python
            tags: |
              tealtigeradmin/tealtiger-python:${{ github.event.inputs.version }}-sidecar
              tealtigeradmin/tealtiger-python:sidecar
              ghcr.io/agentguard-ai/tealtiger-python:${{ github.event.inputs.version }}-sidecar
              ghcr.io/agentguard-ai/tealtiger-python:sidecar
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.tags }}
          platforms: linux/amd64

  # ── Stage 3: Helm Chart ────────────────────────────────────────────
  stage-3-helm:
    name: "Stage 3 - Package Helm Chart"
    needs: stage-2-sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          if [ -d "helm/tealtiger" ]; then
            mkdir -p .helm-packages
            helm package helm/tealtiger -d .helm-packages
            echo "✅ Helm chart packaged for v${{ github.event.inputs.version }}"
          else
            echo "⏭️ No helm/tealtiger directory found, skipping"
          fi

  # ── Post-Launch: GitHub Release ────────────────────────────────────
  post-launch:
    name: Post-Launch
    needs: [stage-1a-npm, stage-1b-pypi, stage-2-sidecar, stage-3-helm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ github.event.inputs.version }}';
            const body = `## TealTiger v${version} — Governance Bundle

            ### What's New
            - **TealEngineV12** — Parallel module evaluation with "most restrictive action wins" merge
            - **TealSecrets** — Secret detection with 500+ patterns and confidence scoring
            - **TealRegistry** — Model/tool allowlisting with provenance verification
            - **TealReliability** — Retry budgets, circuit breakers, and fallback chains
            - **TealMemory** — Memory governance across 5 scopes and 4 classifications
            - **GovernanceDashboard** — Governance visibility UI
            - **BundleExporter** — Evidence export in SARIF v2.1.0, JUnit XML, and JSON
            - **Docker Sidecar** — Language-agnostic governance via HTTP

            ### Install
            \`\`\`bash
            npm install tealtiger@${version}
            pip install tealtiger==${version}
            docker run -p 8080:8080 tealtigeradmin/tealtiger-typescript:${version}-governance
            \`\`\`

            ### Links
            - [npm](https://www.npmjs.com/package/tealtiger)
            - [PyPI](https://pypi.org/project/tealtiger/)
            - [Docker Hub](https://hub.docker.com/u/tealtigeradmin)
            - [Helm Chart](https://github.com/agentguard-ai/helm-charts)
            - [Documentation](https://docs.tealtiger.ai)
            `;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `TealTiger v${version} — Governance Bundle`,
              body,
              draft: false,
              prerelease: false,
            });
            console.log(`✅ GitHub Release created for v${version}`);
