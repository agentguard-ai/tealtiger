title: "[Integration Proposal]: "
labels: ["integration", "collaboration"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔗 Framework / Tool Integration Proposal
        Propose an integration between TealTiger and another framework or tool.

  - type: input
    id: framework-name
    attributes:
      label: Framework / Tool Name
      description: Name of the framework or tool you want to integrate with
      placeholder: "e.g., LangGraph, CrewAI, E2B, Haystack"
    validations:
      required: true

  - type: dropdown
    id: integration-type
    attributes:
      label: Integration Type
      options:
        - Middleware / Plugin
        - Adapter Layer
        - SDK Extension
        - Example / Reference Implementation
        - MCP Server
        - Other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this integration solve?
      placeholder: "When using [framework], developers need governance for..."
    validations:
      required: true

  - type: textarea
    id: hook-point
    attributes:
      label: Where TealTiger Hooks In
      description: Where in the framework's execution flow would TealTiger evaluate policy?
      placeholder: "Before tool execution / between agent turns / on memory write..."
    validations:
      required: true

  - type: textarea
    id: governance-needs
    attributes:
      label: Governance Needs
      description: What governance capabilities are needed?
      placeholder: "Cost limits, tool allowlisting, PII detection, audit trails..."

  - type: textarea
    id: expected-output
    attributes:
      label: Expected Output
      description: What would the deliverable look like?
      placeholder: "Adapter code, example, tests, documentation..."

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to the framework docs, relevant issues, or similar integrations
