[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tealtiger-phoenix"
version = "0.1.0"
description = "Export TealTiger governance decisions as OpenTelemetry spans in Arize Phoenix LLM trace viewer."
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [
    {name = "TealTiger", email = "feedback@tealtiger.ai"}
]
keywords = ["phoenix", "arize", "tealtiger", "governance", "opentelemetry", "observability", "llm-tracing"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "arize-phoenix-otel>=0.16.0",
]

[project.urls]
Homepage = "https://github.com/agentguard-ai/tealtiger"
Documentation = "https://docs.tealtiger.ai/integrations/phoenix"
Repository = "https://github.com/agentguard-ai/tealtiger/tree/main/packages/tealtiger-phoenix"
Issues = "https://github.com/agentguard-ai/tealtiger/issues"

[tool.setuptools.packages.find]
include = ["tealtiger_phoenix*"]
