[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "ag2-tealtiger"
version = "0.1.0"
description = "Deterministic governance adapter for AG2 — policy enforcement, PII detection, cost tracking, per-agent kill switch, governed speaker selection, and structured audit evidence. No LLM in the governance path."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "TealTiger Team", email = "reachout@tealtiger.ai"},
]
keywords = [
    "ag2",
    "ai-agents",
    "multi-agent",
    "governance",
    "security",
    "guardrails",
    "policy",
    "tealtiger",
    "llm",
    "deterministic",
    "pii",
    "audit",
    "kill-switch",
    "cost-tracking",
    "groupchat",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "ag2>=0.6.0,<1.0",
    "tealtiger>=1.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "hypothesis>=6.0.0",
    "mypy>=1.5.0",
    "ruff>=0.4.0",
]

[project.urls]
Homepage = "https://tealtiger.ai"
Documentation = "https://docs.tealtiger.ai/integrations/ag2"
Repository = "https://github.com/agentguard-ai/tealtiger"
Issues = "https://github.com/agentguard-ai/tealtiger/issues"
Changelog = "https://github.com/agentguard-ai/tealtiger/blob/main/packages/ag2-tealtiger/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/ag2_tealtiger"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=ag2_tealtiger --cov-report=term-missing"
markers = [
    "property: Property-based tests using Hypothesis",
    "slow: Tests that take longer to run",
]

[tool.hypothesis]
# Default profile: 100 examples per property test
default_settings = {max_examples = 100, deadline = 5000}

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
strict = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B", "UP"]
ignore = ["E501"]
