[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tealtiger-hindsight"
version = "0.1.0"
description = "Importance-weighted governance decision memory using Hindsight — contextual recall and natural decay for AI agent compliance."
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [
    {name = "TealTiger", email = "feedback@tealtiger.ai"}
]
keywords = ["hindsight", "tealtiger", "governance", "ai-memory", "compliance", "agent-memory"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "hindsight-client>=0.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.urls]
Homepage = "https://github.com/agentguard-ai/tealtiger"
Documentation = "https://docs.tealtiger.ai/integrations/hindsight"
Repository = "https://github.com/agentguard-ai/tealtiger/tree/main/packages/tealtiger-hindsight"
Issues = "https://github.com/agentguard-ai/tealtiger/issues"

[tool.setuptools.packages.find]
include = ["tealtiger_hindsight*"]
