[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "tealtiger-contracts"
version = "1.0.0"
description = "Versioned cross-language governance contracts for TealTiger"
readme = { text = "TealTiger's generated Python models and validators for the shared governance contract package.", content-type = "text/markdown" }
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.10,<3",
]

[project.optional-dependencies]
dev = [
    "datamodel-code-generator==0.68.1",
    "mypy==1.19.1",
    "pytest>=8.3,<9",
    "ruff==0.15.15",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
tealtiger_contracts = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_configs = true

[tool.ruff]
target-version = "py310"
line-length = 100
