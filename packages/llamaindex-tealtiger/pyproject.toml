[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llamaindex-tealtiger"
version = "0.1.0"
description = "TealTiger governance callback handler for LlamaIndex — deterministic policy enforcement, cost tracking, and audit for RAG pipelines"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "Apache-2.0"}
authors = [
    {name = "Naga Satish Chilakamarti", email = "reachout@tealtiger.ai"},
]
keywords = [
    "llamaindex",
    "callback",
    "governance",
    "security",
    "ai-agents",
    "guardrails",
    "policy",
    "tealtiger",
    "llm",
    "rag",
    "deterministic",
    "pii",
    "audit",
    "cost-tracking",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "tealtiger>=1.3.0",
    "llama-index-core>=0.11.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "hypothesis>=6.0.0",
    "mypy>=1.5.0",
    "ruff>=0.4.0",
]

[project.urls]
Homepage = "https://tealtiger.ai"
Documentation = "https://docs.tealtiger.ai/integrations/llamaindex"
Repository = "https://github.com/agentguard-ai/tealtiger"
Issues = "https://github.com/agentguard-ai/tealtiger/issues"
Changelog = "https://github.com/agentguard-ai/tealtiger/blob/main/packages/llamaindex-tealtiger/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/llamaindex_tealtiger"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=llamaindex_tealtiger --cov-report=term-missing"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
strict = true

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B", "UP"]
ignore = ["E501"]
