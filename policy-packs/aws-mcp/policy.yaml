name: aws-mcp
version: "1.0.0"
description: "Policy pack for AWS MCP tools. Defaults to restrictive controls for destructive infrastructure and IAM operations."

tools:
  - name: list_buckets
    risk: READ
  - name: get_bucket
    risk: READ
  - name: create_bucket
    risk: MUTATING
  - name: delete_bucket
    risk: DESTRUCTIVE
  - name: list_objects
    risk: READ
  - name: get_object
    risk: READ
  - name: put_object
    risk: MUTATING
  - name: delete_object
    risk: DESTRUCTIVE
  - name: copy_object
    risk: MUTATING
  - name: get_bucket_policy
    risk: READ
  - name: put_bucket_policy
    risk: DESTRUCTIVE
  - name: delete_bucket_policy
    risk: DESTRUCTIVE
  - name: describe_instances
    risk: READ
  - name: run_instances
    risk: MUTATING
  - name: start_instances
    risk: MUTATING
  - name: stop_instances
    risk: MUTATING
  - name: terminate_instances
    risk: DESTRUCTIVE
  - name: reboot_instances
    risk: MUTATING
  - name: modify_instance_attribute
    risk: DESTRUCTIVE
  - name: describe_instance_types
    risk: READ
  - name: create_security_group
    risk: MUTATING
  - name: delete_security_group
    risk: DESTRUCTIVE
  - name: authorize_security_group_ingress
    risk: DESTRUCTIVE
  - name: revoke_security_group_ingress
    risk: DESTRUCTIVE
  - name: list_users
    risk: READ
  - name: create_user
    risk: MUTATING
  - name: delete_user
    risk: DESTRUCTIVE
  - name: list_roles
    risk: READ
  - name: create_role
    risk: DESTRUCTIVE
  - name: delete_role
    risk: DESTRUCTIVE
  - name: list_policies
    risk: READ
  - name: create_policy
    risk: MUTATING
  - name: delete_policy
    risk: DESTRUCTIVE
  - name: attach_user_policy
    risk: DESTRUCTIVE
  - name: detach_user_policy
    risk: DESTRUCTIVE
  - name: attach_role_policy
    risk: DESTRUCTIVE
  - name: detach_role_policy
    risk: DESTRUCTIVE
  - name: put_role_policy
    risk: DESTRUCTIVE
  - name: delete_role_policy
    risk: DESTRUCTIVE

rules:
  # Hard stop for destructive resource deletions/terminations.
  - tool: terminate_instances
    action: DENY
    when:
      args.instance_id:
        pattern: "(?i)^prod-"
    reason: "Production-scoped instance identifiers must not be terminated by default."

  - tool: delete_bucket
    action: DENY
    when:
      args.bucket_name:
        pattern: "(?i)^(prod|production|corp)-"
    reason: "Deletion of production-tagged buckets is blocked."

  - tool: delete_bucket
    action: DENY
    when:
      args.bucket:
        pattern: "(?i)^(prod|production|corp)-"
    reason: "Deletion of production-tagged buckets is blocked."

  - tool: delete_object
    action: DENY
    when:
      args.bucket_name:
        pattern: "(?i)^(prod|production|corp)-"
    reason: "Object deletions in production-like buckets are blocked."

  - tool: delete_object
    action: DENY
    when:
      args.bucket:
        pattern: "(?i)^(prod|production|corp)-"
    reason: "Object deletions in production-like buckets are blocked."

  - tool: delete_security_group
    action: DENY
    when:
      args.group_name:
        pattern: "(?i)^(prod|production|corp)-"
    reason: "Deleting production-like security groups is blocked."

  - tool: delete_user
    action: DENY
    reason: "IAM user deletion is blocked by default."

  - tool: delete_role
    action: DENY
    reason: "IAM role deletion is blocked by default."

  - tool: delete_policy
    action: DENY
    reason: "IAM policy deletion is blocked by default."

  - tool: put_bucket_policy
    action: DENY
    reason: "Bucket policy writes are blocked by default."

  - tool: delete_bucket_policy
    action: DENY
    reason: "Bucket policy deletion is blocked by default."

  - tool: attach_user_policy
    action: DENY
    reason: "Attaching user policies is blocked by default."

  - tool: detach_user_policy
    action: DENY
    reason: "Detaching user policies is blocked by default."

  - tool: attach_role_policy
    action: DENY
    reason: "Attaching role policies is blocked by default."

  - tool: detach_role_policy
    action: DENY
    reason: "Detaching role policies is blocked by default."

  - tool: put_role_policy
    action: DENY
    reason: "Inline role policy writes are blocked by default."

  - tool: delete_role_policy
    action: DENY
    reason: "Inline role policy deletion is blocked by default."

  # Require explicit approval for potentially high-risk mutable operations.
  - tool: run_instances
    action: REQUIRE_APPROVAL
    when:
      args.image_id:
        pattern: ".*"
    reason: "Launching new EC2 instances requires explicit approval."

  - tool: start_instances
    action: REQUIRE_APPROVAL
    when:
      args.instance_id:
        pattern: "i-"
    reason: "Start operations require approval to avoid unexpected workload changes."

  - tool: stop_instances
    action: REQUIRE_APPROVAL
    when:
      args.instance_id:
        pattern: "i-"
    reason: "Stop operations require approval to avoid unplanned outages."

  - tool: create_user
    action: REQUIRE_APPROVAL
    reason: "IAM user creation requires explicit approval."

  - tool: create_role
    action: REQUIRE_APPROVAL
    reason: "IAM role creation requires explicit approval."
