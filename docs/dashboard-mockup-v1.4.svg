    <text x="786" y="760" font-size="9" fill="#16a34a">$52.10</text>

    <text x="586" y="780" font-size="9" fill="#0f172a">Claude Opus</text>
    <text x="636" y="780" font-size="9" fill="#64748b">→</text>
    <text x="686" y="780" font-size="9" fill="#0f172a">Claude Sonnet</text>
    <text x="786" y="780" font-size="9" fill="#16a34a">$28.60</text>

    <text x="586" y="800" font-size="9" fill="#0f172a">GPT-4o</text>
    <text x="636" y="800" font-size="9" fill="#64748b">→</text>
    <text x="686" y="800" font-size="9" fill="#0f172a">GPT-4o-mini</text>
