    <text x="1080" y="718" font-size="8" fill="#64748b">Validated: 3,200</text>
    <text x="1080" y="732" font-size="8" fill="#64748b">Modified: 12</text>
    <text x="1080" y="746" font-size="8" fill="#dc2626">Blocked: 1</text>
    <!-- MCP -->
