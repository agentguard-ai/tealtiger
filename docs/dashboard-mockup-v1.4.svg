    <text x="958" y="516" font-size="9" fill="#0f172a">analyst-1</text>
    <text x="1050" y="516" font-size="9" fill="#64748b">analyst</text>
    <text x="1120" y="516" font-size="9" fill="#0f172a">$87</text>
    <rect x="1162" y="507" width="38" height="14" rx="3" fill="#f0fdf4"/>
