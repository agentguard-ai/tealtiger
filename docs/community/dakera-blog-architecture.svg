<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="dakeraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#tealGrad)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">TealTiger × Dakera — Governance State Architecture</text>

  <!-- Agent Box -->
  <rect x="50" y="60" width="180" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="140" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">AI Agent</text>
  <text x="140" y="115" text-anchor="middle" font-size="9" fill="#d1d5db">AG2 / LangChain / CrewAI</text>
  <text x="140" y="130" text-anchor="middle" font-size="9" fill="#d1d5db">Tool calls, messages</text>

  <!-- Arrow: Agent → TealTiger -->
  <line x1="230" y1="100" x2="300" y2="100" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TealTiger Box -->
  <rect x="305" y="50" width="220" height="100" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
  <rect x="305" y="50" width="220" height="30" rx="10" fill="url(#tealGrad)"/>
  <rect x="305" y="68" width="220" height="12" fill="url(#tealGrad)"/>
  <text x="415" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🐯 TealTiger Middleware</text>
  <text x="415" y="100" text-anchor="middle" font-size="9" fill="#374151">Policy evaluation (&lt;5ms)</text>
  <text x="415" y="114" text-anchor="middle" font-size="9" fill="#374151">PII • Secrets • Cost • Freeze</text>
  <text x="415" y="128" text-anchor="middle" font-size="9" fill="#374151">Deterministic • No LLM</text>
  <text x="415" y="142" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">TEEC receipt per decision</text>

  <!-- Arrow: TealTiger → LLM -->
  <line x1="525" y1="100" x2="600" y2="100" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <text x="563" y="90" text-anchor="middle" font-size="8" fill="#0d9488">if allowed</text>

  <!-- LLM Box -->
  <rect x="605" y="70" width="140" height="60" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1" filter="url(#shadow)"/>
  <text x="675" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">LLM Provider</text>
  <text x="675" y="115" text-anchor="middle" font-size="9" fill="#166534">OpenAI • Anthropic • etc</text>

  <!-- Arrow: TealTiger → Dakera (persistence) -->
  <line x1="415" y1="150" x2="415" y2="210" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <text x="440" y="185" font-size="8" fill="#7c3aed">persist state</text>

  <!-- Arrow: Dakera → TealTiger (lookup) -->
  <line x1="380" y1="210" x2="380" y2="150" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="355" y="185" font-size="8" fill="#7c3aed" text-anchor="end">evidence lookup</text>

  <!-- Dakera Box -->
  <rect x="260" y="215" width="310" height="160" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <rect x="260" y="215" width="310" height="32" rx="10" fill="url(#dakeraGrad)"/>
  <rect x="260" y="235" width="310" height="12" fill="url(#dakeraGrad)"/>
  <text x="415" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Dakera — Persistent Memory</text>

  <!-- Dakera components -->
  <rect x="275" y="260" width="130" height="45" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="340" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">DakeraCostStorage</text>
  <text x="340" y="293" text-anchor="middle" font-size="8" fill="#7c3aed">Per-agent cost records</text>

  <rect x="425" y="260" width="130" height="45" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">DecisionStore</text>
  <text x="490" y="293" text-anchor="middle" font-size="8" fill="#7c3aed">DENY=0.95, ALLOW=0.80</text>

  <rect x="275" y="315" width="130" height="45" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="340" y="333" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">DelegationHelper</text>
  <text x="340" y="348" text-anchor="middle" font-size="8" fill="#7c3aed">KG edge traversal</text>

  <rect x="425" y="315" width="130" height="45" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="333" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Audit Export</text>
  <text x="490" y="348" text-anchor="middle" font-size="8" fill="#7c3aed">SARIF • JUnit • JSON</text>

  <!-- Key principle badge -->
  <rect x="50" y="180" width="185" height="75" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="143" y="200" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">⚠️ Key Principle</text>
  <text x="143" y="218" text-anchor="middle" font-size="8" fill="#92400e">Storage = evidence,</text>
  <text x="143" y="232" text-anchor="middle" font-size="8" fill="#92400e">NOT authority.</text>
  <text x="143" y="248" text-anchor="middle" font-size="8" fill="#78350f">Fresh eval per action.</text>

  <!-- Stats -->
  <rect x="605" y="180" width="140" height="28" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="675" y="198" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">&lt;5ms governance</text>

  <rect x="605" y="216" width="140" height="28" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="675" y="234" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">~21ms Dakera p50</text>

  <rect x="605" y="252" width="140" height="28" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="675" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Self-hosted</text>

  <rect x="605" y="288" width="140" height="28" rx="5" fill="#f0fdf4" stroke="#86efac"/>
  <text x="675" y="306" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Apache 2.0</text>
</svg>
