<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="550" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Role-Based Per-Agent Policies</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#6b7280">Each agent gets governance rules matched to its role</text>
  
  <!-- Agent boxes (top row) -->
  <!-- Researcher -->
  <rect x="100" y="75" width="120" height="55" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="160" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#0d9488">🔬 Researcher</text>
  <text x="160" y="115" text-anchor="middle" font-size="9" fill="#6b7280">agent-research-01</text>
  
  <!-- Writer -->
  <rect x="340" y="75" width="120" height="55" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#f97316">✍️ Writer</text>
  <text x="400" y="115" text-anchor="middle" font-size="9" fill="#6b7280">agent-writer-01</text>
  
  <!-- Reviewer -->
  <rect x="580" y="75" width="120" height="55" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">👁️ Reviewer</text>
  <text x="640" y="115" text-anchor="middle" font-size="9" fill="#6b7280">agent-review-01</text>
  
  <!-- Arrows from agents to TealEngine -->
  <line x1="160" y1="130" x2="160" y2="185" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal5)"/>
  <line x1="400" y1="130" x2="400" y2="185" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange5)"/>
  <line x1="640" y1="130" x2="640" y2="185" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen5)"/>
  
  <!-- Request labels -->
  <text x="160" y="162" text-anchor="middle" font-size="8" fill="#6b7280">request</text>
  <text x="400" y="162" text-anchor="middle" font-size="8" fill="#6b7280">request</text>
  <text x="640" y="162" text-anchor="middle" font-size="8" fill="#6b7280">request</text>
  
  <!-- TealEngine (center router) -->
  <rect x="200" y="188" width="400" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="400" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">TealEngine — Role Router</text>
  <text x="400" y="234" text-anchor="middle" font-size="9" fill="#9ca3af">Match agent_id → role → policy set</text>
  
  <!-- Arrows from TealEngine to policy boxes -->
  <line x1="240" y1="248" x2="160" y2="300" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal5)"/>
  <line x1="400" y1="248" x2="400" y2="300" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange5)"/>
  <line x1="560" y1="248" x2="640" y2="300" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen5)"/>
  
  <!-- Unknown agent arrow -->
  <path d="M 600 230 L 720 230 L 720 310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed5)"/>
  <text x="680" y="270" font-size="8" fill="#ef4444">unknown</text>
  
  <!-- Policy boxes -->
  <!-- Researcher Policy -->
  <rect x="70" y="303" width="180" height="130" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="160" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488">Researcher Policy</text>
  <line x1="85" y1="333" x2="235" y2="333" stroke="#99f6e4" stroke-width="1"/>
  <text x="95" y="352" font-size="9" fill="#374151">allowed_tools:</text>
  <text x="110" y="365" font-size="8" fill="#6b7280">web_search, read_file</text>
  <text x="95" y="383" font-size="9" fill="#374151">max_cost:</text>
  <text x="110" y="396" font-size="8" fill="#6b7280">$5.00/session</text>
  <text x="95" y="414" font-size="9" fill="#374151">blocked_pii:</text>
  <text x="110" y="427" font-size="8" fill="#6b7280">SSN, credit_card</text>
  
  <!-- Writer Policy -->
  <rect x="310" y="303" width="180" height="130" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#f97316">Writer Policy</text>
  <line x1="325" y1="333" x2="475" y2="333" stroke="#fed7aa" stroke-width="1"/>
  <text x="335" y="352" font-size="9" fill="#374151">allowed_tools:</text>
  <text x="350" y="365" font-size="8" fill="#6b7280">write_file, generate</text>
  <text x="335" y="383" font-size="9" fill="#374151">max_cost:</text>
  <text x="350" y="396" font-size="8" fill="#6b7280">$2.00/session</text>
  <text x="335" y="414" font-size="9" fill="#374151">blocked_pii:</text>
  <text x="350" y="427" font-size="8" fill="#6b7280">ALL (strict mode)</text>
  
  <!-- Reviewer Policy -->
  <rect x="550" y="303" width="180" height="130" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Reviewer Policy</text>
  <line x1="565" y1="333" x2="715" y2="333" stroke="#6ee7b7" stroke-width="1"/>
  <text x="575" y="352" font-size="9" fill="#374151">allowed_tools:</text>
  <text x="590" y="365" font-size="8" fill="#6b7280">read_file, comment</text>
  <text x="575" y="383" font-size="9" fill="#374151">max_cost:</text>
  <text x="590" y="396" font-size="8" fill="#6b7280">$1.00/session</text>
  <text x="575" y="414" font-size="9" fill="#374151">blocked_pii:</text>
  <text x="590" y="427" font-size="8" fill="#6b7280">email, phone</text>
  
  <!-- Default Deny box -->
  <rect x="680" y="313" width="100" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="730" y="333" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">Default Deny</text>
  <text x="730" y="348" text-anchor="middle" font-size="8" fill="#6b7280">Unknown roles</text>
  
  <!-- Footer explanation -->
  <rect x="100" y="460" width="600" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="483" text-anchor="middle" font-size="10" font-weight="500" fill="#374151">Principle of Least Privilege — each agent gets only what it needs</text>
  <text x="400" y="500" text-anchor="middle" font-size="9" fill="#6b7280">Unrecognized agents are denied by default. Policies are declared in teal.yaml and enforced deterministically.</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowTeal5" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M 0 0 L 4 6 L 8 0 Z" fill="#0d9488"/>
    </marker>
    <marker id="arrowOrange5" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M 0 0 L 4 6 L 8 0 Z" fill="#f97316"/>
    </marker>
    <marker id="arrowGreen5" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M 0 0 L 4 6 L 8 0 Z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed5" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M 0 0 L 4 6 L 8 0 Z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>