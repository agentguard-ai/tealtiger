<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="500" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Multi-Stage Defense Pipeline</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#6b7280">Short-circuit: stop as early as possible</text>
  
  <!-- Request box -->
  <rect x="30" y="110" width="80" height="44" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="70" y="136" text-anchor="middle" font-size="11" font-weight="500" fill="#111827">Request</text>
  
  <!-- Arrow to Stage 1 -->
  <line x1="110" y1="132" x2="145" y2="132" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  
  <!-- Stage 1 -->
  <rect x="148" y="90" width="140" height="84" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="218" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Stage 1</text>
  <text x="218" y="130" text-anchor="middle" font-size="10" fill="#065f46">Pattern Scan</text>
  <rect x="168" y="138" width="100" height="18" rx="4" fill="#d1fae5"/>
  <text x="218" y="151" text-anchor="middle" font-size="9" font-weight="500" fill="#065f46">&lt; 5ms</text>
  
  <!-- Stage 1 DENY arrow down -->
  <line x1="218" y1="174" x2="218" y2="240" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="232" y="210" font-size="9" font-weight="600" fill="#ef4444">DENY</text>
  
  <!-- Arrow to Stage 2 -->
  <line x1="288" y1="132" x2="323" y2="132" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  
  <!-- Stage 2 -->
  <rect x="326" y="90" width="140" height="84" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="396" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Stage 2</text>
  <text x="396" y="130" text-anchor="middle" font-size="10" fill="#9a3412">Structural Analysis</text>
  <rect x="346" y="138" width="100" height="18" rx="4" fill="#fed7aa"/>
  <text x="396" y="151" text-anchor="middle" font-size="9" font-weight="500" fill="#9a3412">&lt; 20ms</text>
  
  <!-- Stage 2 DENY arrow down -->
  <line x1="396" y1="174" x2="396" y2="240" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="410" y="210" font-size="9" font-weight="600" fill="#ef4444">DENY</text>
  
  <!-- Arrow to Stage 3 -->
  <line x1="466" y1="132" x2="501" y2="132" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  
  <!-- Stage 3 -->
  <rect x="504" y="90" width="140" height="84" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="574" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Stage 3</text>
  <text x="574" y="130" text-anchor="middle" font-size="10" fill="#991b1b">Local Classifier</text>
  <rect x="524" y="138" width="100" height="18" rx="4" fill="#fecaca"/>
  <text x="574" y="151" text-anchor="middle" font-size="9" font-weight="500" fill="#991b1b">&lt; 50ms</text>
  
  <!-- Stage 3 DENY arrow down -->
  <line x1="574" y1="174" x2="574" y2="240" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="588" y="210" font-size="9" font-weight="600" fill="#ef4444">DENY</text>
  
  <!-- PASS arrow to ALLOWED -->
  <line x1="644" y1="132" x2="690" y2="132" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreenR)"/>
  <text x="667" y="122" text-anchor="middle" font-size="9" font-weight="600" fill="#10b981">PASS</text>
  
  <!-- ALLOWED box -->
  <rect x="693" y="110" width="80" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="733" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">✓ ALLOWED</text>
  <text x="733" y="144" text-anchor="middle" font-size="9" fill="#065f46">Forward</text>
  
  <!-- BLOCKED box (shared) -->
  <rect x="280" y="245" width="180" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="370" y="265" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">✕ BLOCKED</text>
  <text x="370" y="279" text-anchor="middle" font-size="9" fill="#991b1b">Return denial with reason code</text>
  
  <!-- Connect Stage 1 deny to blocked -->
  <path d="M 218 240 L 218 267 L 280 267" stroke="#ef4444" stroke-width="1" fill="none"/>
  <!-- Connect Stage 3 deny to blocked -->
  <path d="M 574 240 L 574 267 L 460 267" stroke="#ef4444" stroke-width="1" fill="none"/>
  
  <!-- Depth Labels section -->
  <rect x="60" y="330" width="680" height="140" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Pipeline Depth Configuration</text>
  
  <!-- Fast -->
  <rect x="90" y="370" width="200" height="30" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="190" y="389" text-anchor="middle" font-size="10" font-weight="500" fill="#065f46">depth: "fast" — Stage 1 only (&lt;5ms)</text>
  
  <!-- Standard -->
  <rect x="90" y="406" width="380" height="30" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="280" y="425" text-anchor="middle" font-size="10" font-weight="500" fill="#9a3412">depth: "standard" — Stages 1+2 (&lt;25ms)</text>
  
  <!-- Deep -->
  <rect x="90" y="442" width="620" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="461" text-anchor="middle" font-size="10" font-weight="500" fill="#991b1b">depth: "deep" — All 3 stages (&lt;75ms)</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#374151"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M 0 0 L 4 6 L 8 0 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreenR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#10b981"/>
    </marker>
  </defs>
</svg>