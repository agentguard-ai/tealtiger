<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portkeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#tealGrad)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">TealTiger × Portkey Gateway — Webhook Guardrail Architecture</text>

  <!-- Your App Box -->
  <rect x="40" y="70" width="140" height="80" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="110" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Your App</text>
  <text x="110" y="126" text-anchor="middle" font-size="10" fill="#d1d5db">LLM Client</text>

  <!-- Arrow: App → Portkey -->
  <line x1="180" y1="110" x2="270" y2="110" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="225" y="100" text-anchor="middle" font-size="9" fill="#6366f1">request</text>

  <!-- Portkey Gateway Box -->
  <rect x="270" y="55" width="200" height="110" rx="8" fill="url(#portkeyGrad)" filter="url(#shadow)"/>
  <text x="370" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Portkey Gateway</text>
  <text x="370" y="100" text-anchor="middle" font-size="9" fill="#e0e7ff">Routing · Retries · Caching</text>
  <text x="370" y="116" text-anchor="middle" font-size="9" fill="#e0e7ff">Observability · Load Balancing</text>
  <line x1="290" y1="128" x2="450" y2="128" stroke="#a5b4fc" stroke-width="0.5"/>
  <text x="370" y="146" text-anchor="middle" font-size="9" fill="#c7d2fe">beforeRequestHook ↓</text>
  <text x="370" y="158" text-anchor="middle" font-size="9" fill="#c7d2fe">afterRequestHook ↓</text>

  <!-- Arrow: Portkey → LLM -->
  <line x1="470" y1="110" x2="560" y2="110" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="515" y="100" text-anchor="middle" font-size="9" fill="#059669">if allowed</text>

  <!-- LLM Provider Box -->
  <rect x="560" y="70" width="140" height="80" rx="8" fill="url(#llmGrad)" filter="url(#shadow)"/>
  <text x="630" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">LLM Provider</text>
  <text x="630" y="118" text-anchor="middle" font-size="9" fill="#d1fae5">OpenAI · Anthropic</text>
  <text x="630" y="132" text-anchor="middle" font-size="9" fill="#d1fae5">Gemini · Bedrock · 250+</text>

  <!-- Arrow: Portkey → TealTiger -->
  <line x1="370" y1="165" x2="370" y2="200" stroke="#0d9488" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowTeal)"/>
  <text x="395" y="188" font-size="9" fill="#0d9488">webhook</text>

  <!-- TealTiger Box -->
  <rect x="260" y="200" width="220" height="170" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
  <rect x="260" y="200" width="220" height="36" rx="10" fill="url(#tealGrad)"/>
  <rect x="260" y="220" width="220" height="16" fill="url(#tealGrad)"/>
  <text x="370" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">🐯 TealTiger</text>
  <text x="370" y="253" text-anchor="middle" font-size="10" fill="#6b7280">Deterministic Governance Engine</text>

  <!-- Guardrail items -->
  <circle cx="290" cy="278" r="4" fill="#0d9488"/>
  <text x="300" y="282" font-size="10" fill="#1e293b">PII Detection &amp; Redaction</text>

  <circle cx="290" cy="300" r="4" fill="#0d9488"/>
  <text x="300" y="304" font-size="10" fill="#1e293b">Prompt Injection Prevention</text>

  <circle cx="290" cy="322" r="4" fill="#0d9488"/>
  <text x="300" y="326" font-size="10" fill="#1e293b">Secret Detection (500+ patterns)</text>

  <circle cx="290" cy="344" r="4" fill="#0d9488"/>
  <text x="300" y="348" font-size="10" fill="#1e293b">Cost Governance &amp; Budget</text>

  <circle cx="290" cy="366" r="4" fill="#0d9488"/>
  <text x="300" y="370" font-size="10" fill="#1e293b">Policy Enforcement (TEEC)</text>

  <!-- Arrow: TealTiger → Portkey (verdict) -->
  <line x1="310" y1="200" x2="310" y2="165" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="285" y="188" font-size="9" fill="#0d9488" text-anchor="end">verdict</text>

  <!-- Stats badges -->
  <rect x="560" y="200" width="130" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="625" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">&lt;5ms latency</text>

  <rect x="560" y="236" width="130" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="625" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Zero LLM calls</text>

  <rect x="560" y="272" width="130" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="625" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Deterministic</text>

  <rect x="560" y="308" width="130" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="625" y="326" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">SARIF Evidence</text>

  <rect x="560" y="344" width="130" height="28" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="625" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Apache-2.0</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
  </defs>
</svg>
