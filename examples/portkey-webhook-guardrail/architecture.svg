<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portkeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0891b2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="900" height="3" rx="2" fill="url(#tealGrad)"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b" letter-spacing="0.3">TealTiger × Portkey Gateway — Webhook Guardrail Architecture</text>

  <!-- ===== TOP ROW: App → Portkey → LLM ===== -->

  <!-- Your App Box -->
  <rect x="50" y="65" width="150" height="70" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="125" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Your App</text>
  <text x="125" y="115" text-anchor="middle" font-size="10" fill="#d1d5db">LLM Client</text>

  <!-- Arrow: App → Portkey -->
  <line x1="200" y1="100" x2="285" y2="100" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="243" y="92" text-anchor="middle" font-size="9" fill="#6b7280">request</text>

  <!-- Portkey Gateway Box -->
  <rect x="290" y="55" width="220" height="90" rx="8" fill="url(#portkeyGrad)" filter="url(#shadow)"/>
  <text x="400" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Portkey Gateway</text>
  <text x="400" y="98" text-anchor="middle" font-size="9" fill="#cffafe">Routing · Retries · Caching</text>
  <text x="400" y="112" text-anchor="middle" font-size="9" fill="#cffafe">Observability · Load Balancing</text>
  <text x="400" y="134" text-anchor="middle" font-size="9" fill="#a5f3fc" font-style="italic">beforeRequestHook ↓  afterRequestHook ↓</text>

  <!-- Arrow: Portkey → LLM -->
  <line x1="510" y1="100" x2="600" y2="100" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="555" y="92" text-anchor="middle" font-size="9" fill="#059669">if allowed</text>

  <!-- LLM Provider Box -->
  <rect x="605" y="65" width="150" height="70" rx="8" fill="url(#llmGrad)" filter="url(#shadow)"/>
  <text x="680" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">LLM Provider</text>
  <text x="680" y="112" text-anchor="middle" font-size="9" fill="#d1fae5">OpenAI · Anthropic · Gemini</text>
  <text x="680" y="125" text-anchor="middle" font-size="9" fill="#d1fae5">Bedrock · Azure · 250+</text>

  <!-- ===== ARROWS: Portkey ↔ TealTiger ===== -->

  <!-- Arrow down: Portkey → TealTiger (webhook) -->
  <line x1="420" y1="145" x2="420" y2="195" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTeal)"/>
  <text x="445" y="175" font-size="9" fill="#0d9488">webhook</text>

  <!-- Arrow up: TealTiger → Portkey (verdict) -->
  <line x1="380" y1="195" x2="380" y2="145" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <text x="355" y="175" font-size="9" fill="#0d9488" text-anchor="end">verdict</text>

  <!-- ===== BOTTOM: TealTiger Box ===== -->

  <rect x="260" y="200" width="280" height="220" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Header bar -->
  <rect x="260" y="200" width="280" height="38" rx="10" fill="url(#tealGrad)"/>
  <rect x="260" y="225" width="280" height="13" fill="url(#tealGrad)"/>
  <text x="400" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">🐯 TealTiger</text>

  <!-- Subtitle -->
  <text x="400" y="260" text-anchor="middle" font-size="10" fill="#6b7280">Deterministic Governance Engine</text>

  <!-- Guardrail items -->
  <circle cx="290" cy="288" r="5" fill="#0d9488"/>
  <text x="302" y="292" font-size="11" fill="#1e293b">PII Detection &amp; Redaction</text>

  <circle cx="290" cy="316" r="5" fill="#0d9488"/>
  <text x="302" y="320" font-size="11" fill="#1e293b">Prompt Injection Prevention</text>

  <circle cx="290" cy="344" r="5" fill="#0d9488"/>
  <text x="302" y="348" font-size="11" fill="#1e293b">Secret Detection (500+ patterns)</text>

  <circle cx="290" cy="372" r="5" fill="#0d9488"/>
  <text x="302" y="376" font-size="11" fill="#1e293b">Cost Governance &amp; Budget</text>

  <circle cx="290" cy="400" r="5" fill="#0d9488"/>
  <text x="302" y="404" font-size="11" fill="#1e293b">Policy Enforcement (TEEC)</text>

  <!-- ===== RIGHT SIDE: Stats badges ===== -->

  <rect x="620" y="220" width="140" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="690" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">&lt;5ms latency</text>

  <rect x="620" y="260" width="140" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="690" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Zero LLM calls</text>

  <rect x="620" y="300" width="140" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="690" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Deterministic</text>

  <rect x="620" y="340" width="140" height="30" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="690" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">SARIF Evidence</text>

  <rect x="620" y="380" width="140" height="30" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="690" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Apache-2.0</text>
</svg>
