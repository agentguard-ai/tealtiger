<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none" role="img" aria-label="TealTiger Governance Dashboard">
  <defs>
    <!-- Teal gradient for the tiger mark -->
    <linearGradient id="tealPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="tealDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0d635b"/>
    </linearGradient>
    <linearGradient id="tealLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="indigoAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="amberAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f766e" flood-opacity="0.25"/>
    </filter>

    <!-- Glow for data pulse -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle background gradient -->
    <linearGradient id="bgFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background fade strip -->
  <rect x="0" y="20" width="480" height="80" rx="10" fill="url(#bgFade)"/>

  <!-- === TIGER MARK (geometric faceted head) === -->
  <g transform="translate(10, 5)" filter="url(#shadow)">

    <!-- Ears -->
    <!-- Left ear outer -->
    <polygon points="12,32 28,12 40,30" fill="url(#tealDark)" opacity="0.9"/>
    <!-- Left ear inner -->
    <polygon points="20,27 28,16 35,28" fill="url(#tealLight)" opacity="0.5"/>
    <!-- Right ear outer -->
    <polygon points={88,32 72,12 60,30} fill="url(#tealDark)" opacity="0.9"/>
    <!-- Right ear inner -->
    <polygon points={80,27 72,16 65,28} fill="url(#tealLight)" opacity="0.5"/>

    {/* Outer head shape — stylized hexagon */}
    <polygon points="50,8 90,22 100,55 85,88 50,100 15,88 0,55 10,22" fill="url(#tealPrimary)" stroke="#0d635b" stroke-width="1.5"/>

    {/* Faceted cheek — left */}
    <polygon points="10,30 25,25 35,40 20,55" fill="#14b8a6" opacity="0.4"/>
    <polygon points="15,50 30,42 25,70 10,62" fill="#0f766e" opacity="0.3"/>

    {/* Faceted cheek — right */}
    <polygon points="90,30 75,25 65,40 80,55" fill="#14b8a6" opacity="0.4"/>
    <polygon points="85,50 70,42 75,70 90,62" fill="#0f766e" opacity="0.3"/>

    {/* Stripe accents — left side */}
    <polygon points="8,45 18,42 16,60 6,55" fill="#0d635b" opacity="0.6"/>
    <polygon points="12,65 20,62 18,78 10,74" fill="#0d635b" opacity="0.5"/>

    {/* Stripe accents — right side */}
    <polygon points="92,45 82,42 84,60 94,55" fill="#0d635b" opacity="0.6"/>
    <polygon points="88,65 80,62 82,78 90,74" fill="#0d635b" opacity="0.5"/>

    {/* Forehead stripe / diamond */}
    <polygon points="50,15 60,22 50,30 40,22" fill="url(#tealLight)" opacity="0.5"/>

    {/* Brow ridges */}
    <polygon points="30,32 45,35 40,42 25,38" fill="#0d635b" opacity="0.3"/>
    <polygon points="70,32 55,35 60,42 75,38" fill="#0d635b" opacity="0.3"/>

    {/* Eyes — amber glow */}
    <ellipse cx="38" cy="44" rx="7" ry="5.5" fill="url(#amberAccent)" filter="url(#glow)"/>
    <ellipse cx="62" cy="44" rx="7" ry="5.5" fill="url(#amberAccent)" filter="url(#glow)"/>
    <!-- Pupils -->
    <ellipse cx="38" cy="44" rx="3" ry="5" fill="#1c1917"/>
    <ellipse cx="62" cy="44" rx="3" ry="5" fill="#1c1917"/>
    <!-- Eye highlights -->
    <circle cx="36" cy="42" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="60" cy="42" r="1.5" fill="white" opacity="0.9"/>

    {/* Nose bridge — data-line stylized */}
    <polygon points="50,40 55,42 50,52 45,42" fill="url(#indigoAccent)" opacity="0.5"/>

    {/* Nose */}
    <polygon points="50,50 50,56 44,53" fill="#1c1917" opacity="0.8"/>
    <polygon points="50,50 50,56 56,53" fill="#1c1917" opacity="0.8"/>

    {/* Snout / muzzle area */}
    <ellipse cx="42" cy="62" rx="6" ry="4" fill="#0d635b" opacity="0.3"/>
    <ellipse cx="58" cy="62" rx="6" ry="4" fill="#0d635b" opacity="0.3"/>

    {/* Mouth curve */}
    <path d="M44,65 Q50,70 56,65" stroke="#fbbf24" stroke-width="1.2" fill="none" opacity="0.6"/>

    {/* Chin */}
    <polygon points="44,72 56,72 50,82" fill="#14b8a6" opacity="0.3"/>

    {/* Whisker dots */}
    <circle cx="28" cy="55" r="1" fill="#fbbf24" opacity="0.6"/>
    <circle cx="24" cy="58" r="1" fill="#fbbf24" opacity="0.6"/>
    <circle cx="26" cy="61" r="1" fill="#fbbf24" opacity="0.6"/>
    <circle cx="72" cy="55" r="1" fill="#fbbf24" opacity="0.6"/>
    <circle cx="76" cy="58" r="1" fill="#fbbf24" opacity="0.6"/>
    <circle cx="74" cy="61" r="1" fill="#fbbf24" opacity="0.6"/>

    {/* Observability pulse line — subtle data stream across the face */}
    <path d="M5,75 Q15,68 25,75 T45,72 T65,78 T85,70 T95,76" stroke="url(#indigoAccent)" stroke-width="1.8" fill="none" opacity="0.7" stroke-linecap="round"/>
    <circle cx="25" cy="75" r="2" fill="#818cf8" opacity="0.8"/>
    <circle cx="45" cy="72" r="2" fill="#818cf8" opacity="0.8"/>
    <circle cx="65" cy="78" r="2" fill="#818cf8" opacity="0.8"/>
    <circle cx="85" cy="70" r="2" fill="#818cf8" opacity="0.8"/>

    {/* Governance grid node at corner */}
    <circle cx="95" cy="25" r="2.5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="5" cy="75" r="2" fill="#5eead4" opacity="0.5"/>
  </g>

  <!-- === TYPOGRAPHY === -->
  <g transform="translate(125, 20)">

    <!-- "Teal" in regular weight -->
    <text x="0" y="48" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="500" fill="#0f172a" letter-spacing="-0.02em">Teal</text>

    <!-- "Tiger" in bold weight with gradient -->
    <text x="110" y="48" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="650" fill="url(#tealDark)" letter-spacing="-0.01em">Tiger</text>

    <!-- Dot accent between words -->
    <circle cx="102" cy="28" r="3.5" fill="url(#amberAccent)" opacity="0.8"/>

    <!-- Tagline -->
    <text x="2" y="76" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="400" fill="#64748b" letter-spacing="0.08em" text-transform="uppercase">GOVERNANCE DASHBOARD</text>

    <!-- Decorative line under tagline -->
    <rect x="2" y="82" width="240" height="0.5" fill="#0f766e" opacity="0.15" rx="0.25"/>

    <!-- Small indicator badges (tech/observability cues) -->
    <rect x="250" y="62" width="48" height="16" rx="4" fill="#0f766e" opacity="0.08"/>
    <text x="252" y="74" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="500" fill="#0f766e" letter-spacing="0.06em">v1.4</text>

    <rect x="302" y="62" width="56" height="16" rx="4" fill="#6366f1" opacity="0.08"/>
    <text x="304" y="74" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="500" fill="#6366f1" letter-spacing="0.06em">BETA</text>
  </g>

  <!-- Small data / observability accents in white space areas -->
  <g opacity="0.08">
    <circle cx="410" cy="90" r="3" fill="#0f766e"/>
    <circle cx="422" cy="86" r="2" fill="#0f766e"/>
    <circle cx="416" cy="95" r="1.5" fill="#0f766e"/>
    <path d="M430,88 L445,88" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M435,92 L450,92" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="2,3"/>
  </g>

  <!-- Accessibility title -->
  <title>TealTiger — Governance Dashboard</title>
  <desc>TealTiger logo featuring a geometric teal tiger head with amber eyes and a subtle data pulse line, paired with the brand name and "Governance Dashboard" tagline.</desc>
</svg>