# Basic TealTiger Security Scan Workflow
# Runs TealTiger guardrails on every push and pull request.

name: TealTiger Basic Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TealTiger Security Scan
        uses: agentguard-ai/tealtiger-action@v1
        with:
          scan-path: ./prompts
